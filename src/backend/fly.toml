app = "wiseguys-api"
primary_region = "lhr"

[build]

[env]
  DATABASE_PATH = "/data/characters.db"
  JWT_EXPIRY_MINUTES = "10080"

[[mounts]]
  source = "sqlite_data"
  destination = "/data"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
